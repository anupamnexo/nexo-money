<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo.money - Fintech Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        :root {
            --navy: #0F1B2D;
            --teal: #00D09C;
            --light-gray: #F7F9FC;
            --muted: #7A8BA3;
            --coral: #FF6B6B;
            --gold: #FFC107;
        }
        .sidebar { transition: transform 0.3s ease; }
        .sidebar.closed { transform: translateX(-100%); }
        .card-gradient { background: linear-gradient(135deg, #1a2f4f 0%, #0F1B2D 100%); }
        .toast { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .modal-overlay { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .trend-up { color: #00D09C; }
        .trend-down { color: #FF6B6B; }
    </style>
</head>
<body style="background-color: var(--light-gray);">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;
        const { AreaChart, Area, BarChart, Bar, PieChart, Pie, LineChart, Line, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

        // ==================== Utility Functions ====================
        const API_BASE = '/api';

        const apiCall = async (endpoint, options = {}) => {
            const token = localStorage.getItem('token');
            const headers = {
                'Content-Type': 'application/json',
                ...(token && { 'Authorization': `Bearer ${token}` }),
                ...options.headers
            };

            const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });

            if (!response.ok) {
                if (response.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.hash = '#/login';
                }
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error || `API Error: ${response.status}`);
            }

            return response.json();
        };

        const formatCurrency = (amount) => '₹' + (amount || 0).toLocaleString('en-IN', { maximumFractionDigits: 0 });
        const formatDate = (dateString) => new Date(dateString).toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });

        const getStatusColor = (status) => {
            const colors = {
                'pending': { bg: 'bg-yellow-100', text: 'text-yellow-800' },
                'approved': { bg: 'bg-green-100', text: 'text-green-800' },
                'rejected': { bg: 'bg-red-100', text: 'text-red-800' },
                'auto_approved': { bg: 'bg-blue-100', text: 'text-blue-800' },
                'active': { bg: 'bg-green-100', text: 'text-green-800' },
                'frozen': { bg: 'bg-red-100', text: 'text-red-800' },
                'inactive': { bg: 'bg-gray-100', text: 'text-gray-800' }
            };
            return colors[status] || colors['pending'];
        };

        // Role utilities
        const getRoleBadgeStyle = (role) => {
            const styles = {
                'super_admin': 'bg-red-100 text-red-800',
                'company_admin': 'bg-purple-100 text-purple-800',
                'admin': 'bg-blue-100 text-blue-800',
                'manager': 'bg-teal-100 text-teal-800',
                'employee': 'bg-gray-100 text-gray-800'
            };
            return styles[role] || styles['employee'];
        };

        const getRoleLabel = (role) => {
            const labels = {
                'super_admin': 'SUPER ADMIN',
                'company_admin': 'COMPANY ADMIN',
                'admin': 'ADMIN',
                'manager': 'MANAGER',
                'employee': 'EMPLOYEE'
            };
            return labels[role] || role?.toUpperCase();
        };

        const getUserRole = () => {
            try {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                return user.role || 'employee';
            } catch { return 'employee'; }
        };

        const isRoleAtLeast = (userRole, minRole) => {
            const hierarchy = { super_admin: 0, company_admin: 1, admin: 2, manager: 3, employee: 4 };
            return (hierarchy[userRole] || 4) <= (hierarchy[minRole] || 4);
        };

        // ==================== Toast Context ====================
        const ToastContext = createContext();
        const useToast = () => {
            const context = useContext(ToastContext);
            if (!context) throw new Error('useToast must be used within ToastProvider');
            return context;
        };

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };
            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <div className="fixed bottom-6 right-6 space-y-2 z-50">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`toast p-4 rounded-lg text-white ${toast.type === 'success' ? 'bg-green-500' : 'bg-red-500'}`}>
                                {toast.message}
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        // ==================== Shared Components ====================
        const Sidebar = ({ isOpen, toggleSidebar, userEmail, userRole, onLogout }) => {
            const currentHash = window.location.hash || '#/dashboard';
            const isActive = (hash) => currentHash === hash;

            const allNavItems = [
                { label: 'Dashboard', hash: '#/dashboard', icon: '📊', roles: ['super_admin', 'company_admin', 'admin', 'manager', 'employee'] },
                { label: 'Companies', hash: '#/companies', icon: '🏢', roles: ['super_admin'] },
                { label: 'Cards', hash: '#/cards', icon: '💳', roles: ['company_admin', 'admin', 'manager', 'employee'] },
                { label: 'Expenses', hash: '#/expenses', icon: '📋', roles: ['company_admin', 'admin', 'manager', 'employee'] },
                { label: 'Approvals', hash: '#/approvals', icon: '✓', roles: ['company_admin', 'admin', 'manager'] },
                { label: 'GST Tracker', hash: '#/gst', icon: '📈', roles: ['super_admin', 'company_admin', 'admin'] },
                { label: 'Team', hash: '#/team', icon: '👥', roles: ['super_admin', 'company_admin', 'admin', 'manager'] },
                { label: 'Settings', hash: '#/settings', icon: '⚙️', roles: ['company_admin'] },
                { label: 'Analytics', hash: '#/analytics', icon: '📉', roles: ['super_admin', 'company_admin', 'admin', 'manager'] },
            ];

            const navItems = allNavItems.filter(item => item.roles.includes(userRole));

            return (
                <>
                    {isOpen && <div className="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden" onClick={toggleSidebar}></div>}
                    <div className={`sidebar fixed lg:static left-0 top-0 h-screen w-64 flex flex-col z-50 transition-transform ${!isOpen && 'closed'} lg:translate-x-0 bg-blue-900 text-white`} style={{ backgroundColor: 'var(--navy)' }}>
                        <div className="p-6 border-b border-blue-800">
                            <div className="flex items-center justify-between">
                                <div>
                                    <h1 className="text-xl font-bold">Nexo</h1>
                                    <p className="text-xs text-blue-300">Money Dashboard</p>
                                </div>
                                <button onClick={toggleSidebar} className="lg:hidden text-white">✕</button>
                            </div>
                        </div>

                        <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                            {navItems.map(item => (
                                <a key={item.hash} href={item.hash} className={`block px-4 py-3 rounded-lg transition-colors ${isActive(item.hash) ? 'bg-teal-500 text-navy' : 'hover:bg-blue-800'}`} style={isActive(item.hash) ? { backgroundColor: 'var(--teal)', color: 'var(--navy)' } : {}}>
                                    <span className="mr-2">{item.icon}</span>{item.label}
                                </a>
                            ))}
                        </nav>

                        <div className="p-4 border-t border-blue-800 space-y-3">
                            <div className="text-xs text-blue-300 space-y-1">
                                <p className="truncate">{userEmail}</p>
                                <span className={`badge ${getRoleBadgeStyle(userRole)}`}>{getRoleLabel(userRole)}</span>
                            </div>
                            <button onClick={onLogout} className="w-full bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded-lg text-sm font-medium">Logout</button>
                        </div>
                    </div>
                </>
            );
        };

        const TopBar = ({ toggleSidebar, userName, userRole }) => (
            <div className="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
                <button onClick={toggleSidebar} className="lg:hidden text-navy text-xl">☰</button>
                <div className="flex-1 flex items-center gap-2 lg:hidden">
                    <span className="text-sm font-semibold text-navy">Nexo</span>
                </div>
                <div className="flex items-center gap-3">
                    <span className={`badge ${getRoleBadgeStyle(userRole)}`}>{getRoleLabel(userRole)}</span>
                    <span className="text-sm text-muted">{userName}</span>
                </div>
            </div>
        );

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="modal-overlay fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40">
                    <div className="bg-white rounded-lg shadow-lg max-w-md w-full mx-4 max-h-96 overflow-y-auto">
                        <div className="flex justify-between items-center p-6 border-b border-gray-200">
                            <h2 className="text-lg font-bold text-navy">{title}</h2>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-700">✕</button>
                        </div>
                        <div className="p-6">{children}</div>
                    </div>
                </div>
            );
        };

        const StatCard = ({ label, value, trend, trendValue, icon }) => (
            <div className="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
                <div className="flex items-start justify-between">
                    <div>
                        <p className="text-sm text-muted font-medium">{label}</p>
                        <p className="text-2xl font-bold text-navy mt-2">{value}</p>
                        {trendValue && <p className={`text-xs mt-2 ${trend === 'up' ? 'trend-up' : 'trend-down'}`}>{trend === 'up' ? '↑' : '↓'} {trendValue} from last month</p>}
                    </div>
                    <div className="text-3xl">{icon}</div>
                </div>
            </div>
        );

        const Badge = ({ status }) => {
            const colors = getStatusColor(status);
            return <span className={`badge ${colors.bg} ${colors.text}`}>{(status || '').replace('_', ' ').toUpperCase()}</span>;
        };

        const RoleBadge = ({ role }) => <span className={`badge ${getRoleBadgeStyle(role)}`}>{getRoleLabel(role)}</span>;

        const LoadingSpinner = () => (
            <div className="flex justify-center items-center p-12">
                <div className="text-center">
                    <div className="inline-block animate-spin text-4xl mb-4">⏳</div>
                    <p className="text-muted">Loading...</p>
                </div>
            </div>
        );

        // ==================== Auth Page ====================
        const LoginPage = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isLogin, setIsLogin] = useState(true);
            const [companyName, setCompanyName] = useState('');
            const [name, setName] = useState('');
            const [loading, setLoading] = useState(false);
            const { addToast } = useToast();

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const endpoint = isLogin ? '/auth/login' : '/auth/register';
                    const body = isLogin
                        ? { email, password }
                        : { email, password, name: name, company_name: companyName };
                    const data = await apiCall(endpoint, {
                        method: 'POST',
                        body: JSON.stringify(body)
                    });
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    if (data.companies) localStorage.setItem('companies', JSON.stringify(data.companies));
                    addToast(isLogin ? 'Login successful!' : 'Registration successful!', 'success');
                    window.location.hash = '#/dashboard';
                    window.location.reload();
                } catch (err) {
                    addToast(err.message, 'error');
                } finally {
                    setLoading(false);
                }
            };

            const demoAccounts = [
                { label: 'Super Admin', email: 'platform@nexo.money', password: 'admin123', color: 'bg-red-500' },
                { label: 'Company Admin', email: 'priya.shah@technova.com', password: 'demo123', color: 'bg-purple-500' },
                { label: 'Admin', email: 'rajesh.kumar@technova.com', password: 'demo123', color: 'bg-blue-500' },
                { label: 'Manager', email: 'deepak.gupta@technova.com', password: 'demo123', color: 'bg-teal-500' },
                { label: 'Employee', email: 'neha.patel@technova.com', password: 'demo123', color: 'bg-gray-500' },
            ];

            const handleDemoLogin = async (account) => {
                setLoading(true);
                try {
                    const data = await apiCall('/auth/login', {
                        method: 'POST',
                        body: JSON.stringify({ email: account.email, password: account.password })
                    });
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    if (data.companies) localStorage.setItem('companies', JSON.stringify(data.companies));
                    addToast(`Logged in as ${account.label}!`, 'success');
                    window.location.hash = '#/dashboard';
                    window.location.reload();
                } catch (err) {
                    addToast(err.message, 'error');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center" style={{ backgroundColor: 'var(--light-gray)' }}>
                    <div className="w-full max-w-md">
                        <div className="bg-white rounded-lg shadow-lg p-8">
                            <div className="text-center mb-8">
                                <h1 className="text-3xl font-bold text-navy">Nexo</h1>
                                <p className="text-muted text-sm mt-1">Smart Expense Management</p>
                            </div>

                            <form onSubmit={handleSubmit} className="space-y-4">
                                {!isLogin && (
                                    <>
                                        <div>
                                            <label className="block text-sm font-medium text-navy mb-2">Your Name</label>
                                            <input type="text" value={name} onChange={(e) => setName(e.target.value)} required className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" placeholder="John Doe" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-navy mb-2">Company Name</label>
                                            <input type="text" value={companyName} onChange={(e) => setCompanyName(e.target.value)} required className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" placeholder="Acme Corp" />
                                        </div>
                                    </>
                                )}
                                <div>
                                    <label className="block text-sm font-medium text-navy mb-2">Email</label>
                                    <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" placeholder="you@example.com" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-navy mb-2">Password</label>
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" placeholder="••••••••" />
                                </div>
                                <button type="submit" disabled={loading} className="w-full py-2 px-4 rounded-lg font-semibold text-white transition-colors" style={{ backgroundColor: 'var(--teal)', color: 'var(--navy)' }}>
                                    {loading ? 'Loading...' : isLogin ? 'Login' : 'Register Company'}
                                </button>
                            </form>

                            <div className="mt-6">
                                <p className="text-xs text-muted text-center mb-3">Quick Demo Login</p>
                                <div className="grid grid-cols-1 gap-2">
                                    {demoAccounts.map(account => (
                                        <button key={account.email} onClick={() => handleDemoLogin(account)} disabled={loading} className={`w-full py-2 px-4 ${account.color} text-white rounded-lg text-sm font-medium hover:opacity-90 transition-opacity`}>
                                            {account.label} — {account.email}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="mt-4 text-center">
                                <button onClick={() => setIsLogin(!isLogin)} className="text-sm text-muted hover:text-navy">
                                    {isLogin ? "Don't have an account? Register" : "Already have an account? Login"}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== Dashboard Page ====================
        const Dashboard = () => {
            const [dashboard, setDashboard] = useState(null);
            const [gstData, setGstData] = useState(null);
            const [spendData, setSpendData] = useState([]);
            const [categoryData, setCategoryData] = useState([]);
            const [teamData, setTeamData] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [budgets, setBudgets] = useState([]);
            const [loading, setLoading] = useState(true);
            const role = getUserRole();

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const promises = [apiCall('/dashboard')];
                        // Only fetch GST for admin+ roles
                        if (isRoleAtLeast(role, 'admin')) {
                            promises.push(apiCall('/gst'));
                        }

                        const results = await Promise.all(promises);
                        const dashData = results[0].dashboard;
                        setDashboard(dashData);
                        if (results[1]) setGstData(results[1].gst);

                        const categoryArray = Object.entries(dashData.spend_by_category || {}).map(([name, value]) => ({ name, value }));
                        setCategoryData(categoryArray);

                        const teamArray = Object.entries(dashData.spend_by_team || {}).map(([name, value]) => ({ name, value }));
                        setTeamData(teamArray);

                        const spendArray = Object.entries(dashData.spend_by_category || {}).map(([month, amount]) => ({ month, amount }));
                        setSpendData(spendArray);

                        setTransactions(dashData.recent_transactions || []);
                        setBudgets(dashData.budget_utilization || []);
                    } catch (err) {
                        console.error('Error fetching dashboard data:', err);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            if (loading) return <LoadingSpinner />;

            const COLORS = ['#00D09C', '#0F1B2D', '#7A8BA3', '#FF6B6B'];

            return (
                <div className="space-y-6">
                    {role === 'super_admin' && (
                        <div className="bg-red-50 border border-red-200 rounded-lg p-4">
                            <p className="text-sm text-red-800 font-medium">Platform Admin View — Showing aggregated data across all companies</p>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard label="Total Spend (Month)" value={formatCurrency(dashboard?.total_spend_month || 0)} icon="💰" />
                        <StatCard label="Active Cards" value={dashboard?.active_cards || 0} icon="💳" />
                        <StatCard label="Pending Approvals" value={dashboard?.pending_approvals || 0} icon="⏳" />
                        {gstData && <StatCard label="GST ITC Claimable" value={formatCurrency(gstData?.claimable_itc || 0)} icon="📈" />}
                        {!gstData && <StatCard label="Today's Spend" value={formatCurrency(dashboard?.total_spend_today || 0)} icon="📅" />}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-lg p-6 shadow-sm">
                            <h3 className="text-lg font-bold text-navy mb-4">Spend by Category</h3>
                            <ResponsiveContainer width="100%" height={300}>
                                <AreaChart data={spendData}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                    <XAxis dataKey="month" stroke="var(--muted)" />
                                    <YAxis stroke="var(--muted)" />
                                    <Tooltip contentStyle={{ backgroundColor: '#fff', border: '1px solid #e5e7eb', borderRadius: '8px' }} />
                                    <Area type="monotone" dataKey="amount" stroke="var(--teal)" fill="var(--teal)" fillOpacity={0.1} />
                                </AreaChart>
                            </ResponsiveContainer>
                        </div>

                        <div className="bg-white rounded-lg p-6 shadow-sm">
                            <h3 className="text-lg font-bold text-navy mb-4">Category Breakdown</h3>
                            <ResponsiveContainer width="100%" height={300}>
                                <PieChart>
                                    <Pie data={categoryData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={80} label>
                                        {categoryData.map((entry, index) => (
                                            <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                        ))}
                                    </Pie>
                                    <Tooltip />
                                </PieChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    {budgets.length > 0 && isRoleAtLeast(role, 'admin') && (
                        <div className="bg-white rounded-lg p-6 shadow-sm">
                            <h3 className="text-lg font-bold text-navy mb-4">Budget Utilization</h3>
                            <div className="space-y-4">
                                {budgets.map((budget, idx) => (
                                    <div key={idx}>
                                        <div className="flex justify-between mb-2">
                                            <span className="text-sm font-medium text-navy">{budget.category}</span>
                                            <span className="text-sm text-muted">{formatCurrency(budget.spent)} / {formatCurrency(budget.limit)}</span>
                                        </div>
                                        <div className="w-full bg-gray-200 rounded-full h-2">
                                            <div className="bg-teal-500 h-2 rounded-full transition-all" style={{ width: `${Math.min((budget.spent / budget.limit) * 100, 100)}%`, backgroundColor: 'var(--teal)' }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="bg-white rounded-lg p-6 shadow-sm">
                        <h3 className="text-lg font-bold text-navy mb-4">Recent Transactions</h3>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="border-b border-gray-200">
                                        <th className="text-left py-3 text-muted font-medium">Merchant</th>
                                        <th className="text-left py-3 text-muted font-medium">Category</th>
                                        <th className="text-right py-3 text-muted font-medium">Amount</th>
                                        <th className="text-left py-3 text-muted font-medium">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {transactions.map((txn, idx) => (
                                        <tr key={idx} className="border-b border-gray-100 hover:bg-gray-50">
                                            <td className="py-3 text-navy font-medium">{txn.merchant_name || txn.merchant}</td>
                                            <td className="py-3 text-muted">{txn.category}</td>
                                            <td className="py-3 text-right text-navy font-semibold">{formatCurrency(txn.amount)}</td>
                                            <td className="py-3"><Badge status={txn.status} /></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            const { addToast } = useToast();

            useEffect(() => {
                const fetchApprovals = async () => {
                    try {
                        const data = await apiCall('/approvals');
                        const all = data.approvals || [];
                        setPending(all.filter(a => a.status === 'pending'));
                        setHistory(all.filter(a => a.status !== 'pending'));
                    } catch (err) {
                        addToast('Error loading approvals', 'error');
                    } finally {
                        setLoading(false);
                    }
                };
                fetchApprovals();
            }, []);

            const handleApprove = async (expenseId) => {
                try {
                    const result = await apiCall(`/expenses/${expenseId}/approve`, { method: 'PUT', body: JSON.stringify({ comment }) });
                    addToast(result.message || 'Expense approved!', 'success');
                    setPending(pending.filter(a => a.expense_id !== expenseId));
                    setComment('');
                } catch (err) {
                    addToast(err.message, 'error');
                }
            };

            const handleReject = async (expenseId) => {
                try {
                    await apiCall(`/expenses/${expenseId}/reject`, { method: 'PUT', body: JSON.stringify({ comment }) });
                    addToast('Expense rejected!', 'success');
                    setPending(pending.filter(a => a.expense_id !== expenseId));
                    setComment('');
                } catch (err) {
                    addToast(err.message, 'error');
                }
            };

            if (loading) return <LoadingSpinner />;

            return (
                <div className="space-y-6">
                    <h1 className="text-2xl font-bold text-navy">Approval Requests</h1>

                    <div className="flex gap-2 bg-white rounded-lg p-1 shadow-sm w-fit">
                        {['pending', 'history'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded transition-colors ${activeTab === tab ? 'bg-teal-100 text-navy font-semibold' : 'text-muted'}`} style={activeTab === tab ? { backgroundColor: 'rgba(0, 208, 156, 0.2)' } : {}}>
                                {tab === 'pending' ? `Pending (${pending.length})` : `History (${history.length})`}
                            </button>
                        ))}
                    </div>

                    <div className="space-y-4">
                        {activeTab === 'pending' && pending.map(item => (
                            <div key={item.id} className="bg-white rounded-lg p-6 shadow-sm border-l-4" style={{ borderColor: 'var(--gold)' }}>
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 className="text-lg font-bold text-navy">{item.submitter_name || 'Unknown'}</h3>
                                        <p className="text-sm text-muted">{item.merchant_name} · {item.category}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-2xl font-bold text-navy">{formatCurrency(item.amount)}</p>
                                        <p className="text-xs text-muted">Level {item.approval_level}</p>
                                    </div>
                                </div>
                                {item.description && (
                                    <div className="mb-4 p-3 bg-gray-50 rounded text-sm text-navy">{item.description}</div>
                                )}
                                <div className="mb-4">
                                    <input type="text" value={comment} onChange={(e) => setComment(e.target.value)} placeholder="Add optional comment..." className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 text-sm" />
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => handleApprove(item.expense_id)} className="flex-1 py-2 px-4 rounded-lg font-semibold text-white" style={{ backgroundColor: '#00D09C' }}>✓ Approve</button>
                                    <button onClick={() => handleReject(item.expense_id)} className="flex-1 py-2 px-4 rounded-lg font-semibold text-white" style={{ backgroundColor: '#FF6B6B' }}>✕ Reject</button>
                                </div>
                            </div>
                        ))}

                        {activeTab === 'pending' && pending.length === 0 && (
                            <div className="bg-white rounded-lg p-12 shadow-sm text-center">
                                <p className="text-4xl mb-4">✓</p>
                                <p className="text-lg font-medium text-navy">All caught up!</p>
                                <p className="text-muted">No pending approvals</p>
                            </div>
                        )}

                        {activeTab === 'history' && history.map(item => (
                            <div key={item.id} className={`bg-white rounded-lg p-6 shadow-sm border-l-4 ${item.status === 'approved' ? 'border-green-500' : 'border-red-500'}`}>
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h3 className="text-lg font-bold text-navy">{item.submitter_name || 'Unknown'}</h3>
                                        <p className="text-sm text-muted">{item.merchant_name}</p>
                                    </div>
                                    <div className="text-right">
                                        <Badge status={item.status} />
                                        <p className="text-xl font-bold text-navy mt-2">{formatCurrency(item.amount)}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ==================== GST Tracker Page ====================
        const GSTPage = () => {
            const [gstStats, setGstStats] = useState(null);
            const [monthlyBreakdown, setMonthlyBreakdown] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [missingGSTIN, setMissingGSTIN] = useState(0);

            useEffect(() => {
                const fetchGSTData = async () => {
                    try {
                        const gstRes = await apiCall('/gst');
                        const gstData = gstRes.gst;
                        setGstStats(gstData);
                        const monthlyArray = Object.entries(gstData.gst_by_month || {}).map(([month, amount]) => ({ month, amount }));
                        setMonthlyBreakdown(monthlyArray);
                        setMissingGSTIN(gstData.missing_gstin_count || 0);
                        const expensesRes = await apiCall('/expenses');
                        setExpenses(expensesRes.expenses || []);
                    } catch (err) {
                        console.error('Error loading GST data:', err);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchGSTData();
            }, []);

            if (loading) return <LoadingSpinner />;

            return (
                <div className="space-y-6">
                    <h1 className="text-2xl font-bold text-navy">GST Tracker</h1>
                    {missingGSTIN > 0 && (
                        <div className="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded">
                            <p className="text-sm text-yellow-800"><strong>Alert:</strong> {missingGSTIN} expenses missing vendor GSTIN</p>
                        </div>
                    )}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard label="Total GST Paid" value={formatCurrency(gstStats?.total_gst_paid || 0)} icon="💳" />
                        <StatCard label="Claimable ITC" value={formatCurrency(gstStats?.claimable_itc || 0)} icon="✓" />
                        <StatCard label="ITC Recovery Rate" value={`${gstStats?.itc_recovery_rate || 0}%`} icon="📊" />
                        <StatCard label="Missing GSTIN" value={missingGSTIN} icon="⚠" />
                    </div>
                    <div className="bg-white rounded-lg p-6 shadow-sm">
                        <h3 className="text-lg font-bold text-navy mb-4">Monthly GST Breakdown</h3>
                        <ResponsiveContainer width="100%" height={300}>
                            <BarChart data={monthlyBreakdown}>
                                <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                <XAxis dataKey="month" stroke="var(--muted)" />
                                <YAxis stroke="var(--muted)" />
                                <Tooltip contentStyle={{ backgroundColor: '#fff', border: '1px solid #e5e7eb', borderRadius: '8px' }} />
                                <Bar dataKey="amount" fill="var(--teal)" />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                    <div className="bg-white rounded-lg p-6 shadow-sm overflow-x-auto">
                        <h3 className="text-lg font-bold text-navy mb-4">GST Details</h3>
                        <table className="w-full text-sm">
                            <thead>
                                <tr className="border-b border-gray-200">
                                    <th className="text-left py-3 text-muted font-medium">Merchant</th>
                                    <th className="text-left py-3 text-muted font-medium">GSTIN</th>
                                    <th className="text-right py-3 text-muted font-medium">Amount</th>
                                    <th className="text-right py-3 text-muted font-medium">CGST</th>
                                    <th className="text-right py-3 text-muted font-medium">SGST</th>
                                    <th className="text-right py-3 text-muted font-medium">IGST</th>
                                </tr>
                            </thead>
                            <tbody>
                                {expenses.slice(0, 20).map((exp, idx) => (
                                    <tr key={idx} className="border-b border-gray-100 hover:bg-gray-50">
                                        <td className="py-3 text-navy font-medium">{exp.merchant_name}</td>
                                        <td className="py-3 text-muted font-mono text-xs">{exp.gstin_vendor || '—'}</td>
                                        <td className="py-3 text-right text-navy font-semibold">{formatCurrency(exp.amount)}</td>
                                        <td className="py-3 text-right text-navy">{formatCurrency(exp.cgst || 0)}</td>
                                        <td className="py-3 text-right text-navy">{formatCurrency(exp.sgst || 0)}</td>
                                        <td className="py-3 text-right text-navy">{formatCurrency(exp.igst || 0)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // ==================== Team Page ====================
        const TeamPage = () => {
            const [teamMembers, setTeamMembers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [newMember, setNewMember] = useState({ name: '', email: '', role: 'employee', department: '', issue_card: false, manager_id: '' });
            const { addToast } = useToast();
            const role = getUserRole();
            const canAddMembers = isRoleAtLeast(role, 'admin');

            // Determine which roles this user can create
            const creatableRoles = role === 'super_admin' ? ['company_admin', 'admin', 'manager', 'employee']
                : role === 'company_admin' ? ['admin', 'manager', 'employee']
                : role === 'admin' ? ['manager', 'employee']
                : [];

            useEffect(() => {
                const fetchTeam = async () => {
                    try {
                        const data = await apiCall('/team');
                        setTeamMembers(data.team || []);
                    } catch (err) {
                        addToast('Error loading team', 'error');
                    } finally {
                        setLoading(false);
                    }
                };
                fetchTeam();
            }, []);

            const handleAddMember = async () => {
                if (!newMember.name || !newMember.email) { addToast('Please fill required fields', 'error'); return; }
                try {
                    const payload = { ...newMember };
                    if (payload.manager_id) payload.manager_id = parseInt(payload.manager_id);
                    await apiCall('/team', { method: 'POST', body: JSON.stringify(payload) });
                    addToast('Team member added!', 'success');
                    setShowModal(false);
                    setNewMember({ name: '', email: '', role: 'employee', department: '', issue_card: false, manager_id: '' });
                    const data = await apiCall('/team');
                    setTeamMembers(data.team || []);
                } catch (err) {
                    addToast(err.message, 'error');
                }
            };

            if (loading) return <LoadingSpinner />;

            const managers = teamMembers.filter(m => m.role === 'manager');

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-2xl font-bold text-navy">Team Management</h1>
                        {canAddMembers && (
                            <button onClick={() => setShowModal(true)} className="px-6 py-2 rounded-lg font-semibold" style={{ backgroundColor: 'var(--teal)', color: 'var(--navy)' }}>+ Add Team Member</button>
                        )}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {teamMembers.map((member) => (
                            <div key={member.id} className="bg-white rounded-lg p-6 shadow-sm border-t-4" style={{ borderColor: 'var(--teal)' }}>
                                <div className="flex items-start justify-between mb-4">
                                    <div>
                                        <h3 className="text-lg font-bold text-navy">{member.name}</h3>
                                        <p className="text-sm text-muted mt-1">{member.email}</p>
                                    </div>
                                </div>
                                <div className="mb-4 pb-4 border-b border-gray-200 flex items-center gap-2">
                                    <RoleBadge role={member.role} />
                                    {member.department && <span className="text-xs text-muted">· {member.department}</span>}
                                    {member.status === 'inactive' && <Badge status="inactive" />}
                                </div>
                                {member.manager_name && (
                                    <p className="text-xs text-muted mb-2">Reports to: <span className="text-navy font-medium">{member.manager_name}</span></p>
                                )}
                                <div className="text-xs text-muted">Joined {formatDate(member.created_at)}</div>
                            </div>
                        ))}
                    </div>

                    <Modal isOpen={showModal} onClose={() => setShowModal(false)} title="Add Team Member">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-navy mb-2">Name *</label>
                                <input type="text" value={newMember.name} onChange={(e) => setNewMember({ ...newMember, name: e.target.value })} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-navy mb-2">Email *</label>
                                <input type="email" value={newMember.email} onChange={(e) => setNewMember({ ...newMember, email: e.target.value })} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-navy mb-2">Role</label>
                                <select value={newMember.role} onChange={(e) => setNewMember({ ...newMember, role: e.target.value })} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
                                    {creatableRoles.map(r => (
                                        <option key={r} value={r}>{getRoleLabel(r)}</option>
                                    ))}
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-navy mb-2">Department</label>
                                <input type="text" value={newMember.department} onChange={(e) => setNewMember({ ...newMember, department: e.target.value })} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" placeholder="e.g., Engineering" />
                            </div>
                            {(newMember.role === 'employee' || newMember.role === 'manager') && managers.length > 0 && (
                                <div>
                                    <label className="block text-sm font-medium text-navy mb-2">Assign Manager</label>
                                    <select value={newMember.manager_id} onChange={(e) => setNewMember({ ...newMember, manager_id: e.target.value })} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
                                        <option value="">No manager</option>
                                        {managers.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                    </select>
                                </div>
                            )}
                            <label className="flex items-center gap-2">
                                <input type="checkbox" checked={newMember.issue_card} onChange={(e) => setNewMember({ ...newMember, issue_card: e.target.checked })} />
                                <span className="text-sm text-navy">Issue card immediately</span>
                            </label>
                            <button onClick={handleAddMember} className="w-full py-2 px-4 rounded-lg font-semibold" style={{ backgroundColor: 'var(--teal)', color: 'var(--navy)' }}>Add Member</button>
                        </div>
                    </Modal>
                </div>
            );
        };

        // ==================== Analytics Page ====================
        const AnalyticsPage = () => {
            const [trendData, setTrendData] = useState([]);
            const [categoryData, setCategoryData] = useState([]);
            const [merchantData, setMerchantData] = useState([]);
            const [metrics, setMetrics] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchAnalytics = async () => {
                    try {
                        const analyticsRes = await apiCall('/analytics');
                        const d = analyticsRes.analytics;
                        setTrendData(Object.entries(d.spend_trend || {}).map(([month, amount]) => ({ month, amount })));
                        setCategoryData((d.category_breakdown || []).map(c => ({ name: c.category, value: c.spent })));
                        setMerchantData((d.top_merchants || []).map(m => ({ name: m.merchant, amount: m.spent })));
                        setMetrics(d);
                    } catch (err) {
                        console.error('Error loading analytics:', err);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchAnalytics();
            }, []);

            if (loading) return <LoadingSpinner />;

            const COLORS = ['#00D09C', '#0F1B2D', '#7A8BA3', '#FF6B6B'];

            return (
                <div className="space-y-6">
                    <h1 className="text-2xl font-bold text-navy">Analytics & Insights</h1>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard label="Avg Transaction" value={formatCurrency(metrics?.avg_transaction_size || 0)} icon="💵" />
                        <StatCard label="Total Transactions" value={metrics?.total_transactions || 0} icon="🔢" />
                        <StatCard label="Categories" value={categoryData.length} icon="📊" />
                        <StatCard label="Total Spend" value={formatCurrency(Object.values(metrics?.spend_trend || {}).reduce((a, b) => a + b, 0))} icon="💰" />
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-lg p-6 shadow-sm">
                            <h3 className="text-lg font-bold text-navy mb-4">12-Month Spend Trend</h3>
                            <ResponsiveContainer width="100%" height={300}>
                                <LineChart data={trendData}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                    <XAxis dataKey="month" stroke="var(--muted)" />
                                    <YAxis stroke="var(--muted)" />
                                    <Tooltip />
                                    <Line type="monotone" dataKey="amount" stroke="var(--teal)" strokeWidth={2} dot={{ fill: 'var(--teal)', r: 4 }} />
                                </LineChart>
                            </ResponsiveContainer>
                        </div>
                        <div className="bg-white rounded-lg p-6 shadow-sm">
                            <h3 className="text-lg font-bold text-navy mb-4">Category Breakdown</h3>
                            <ResponsiveContainer width="100%" height={300}>
                                <PieChart>
                                    <Pie data={categoryData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={80} label>
                                        {categoryData.map((entry, index) => (
                                            <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                        ))}
                                    </Pie>
                                    <Tooltip />
                                </PieChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                    <div className="bg-white rounded-lg p-6 shadow-sm">
                        <h3 className="text-lg font-bold text-navy mb-4">Top Merchants</h3>
                        <ResponsiveContainer width="100%" height={300}>
                            <BarChart data={merchantData} layout="vertical">
                                <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                <XAxis type="number" stroke="var(--muted)" />
                                <YAxis dataKey="name" type="category" stroke="var(--muted)" width={120} />
                                <Tooltip />
                                <Bar dataKey="amount" fill="var(--teal)" />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        };

        // ==================== Main App Component ====================
        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(!!localStorage.getItem('token'));
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [userEmail, setUserEmail] = useState('');
            const [userName, setUserName] = useState('');
            const [userRole, setUserRole] = useState('employee');
            const [, forceUpdate] = useState(0);
            const { addToast } = useToast();

            useEffect(() => {
                const token = localStorage.getItem('token');
                const user = localStorage.getItem('user');
                if (token && user) {
                    setIsAuthenticated(true);
                    const userData = JSON.parse(user);
                    setUserEmail(userData.email || '');
                    setUserName(userData.name || userData.email || '');
                    setUserRole(userData.role || 'employee');
                } else {
                    setIsAuthenticated(false);
                }

                // Listen for hash changes to re-render
                const handleHashChange = () => {
                    setSidebarOpen(false);
                    forceUpdate(n => n + 1);
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const handleLogout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                localStorage.removeItem('companies');
                setIsAuthenticated(false);
                window.location.hash = '#/login';
                addToast('Logged out successfully', 'success');
            };

            if (!isAuthenticated) {
                return <LoginPage />;
            }

            const currentHash = window.location.hash || '#/dashboard';

            const pageMap = {
                '#/dashboard': Dashboard,
                '#/companies': CompaniesPage,
                '#/cards': CardsPage,
                '#/expenses': ExpensesPage,
                '#/approvals': ApprovalsPage,
                '#/gst': GSTPage,
                '#/team': TeamPage,
                '#/settings': SettingsPage,
                '#/analytics': AnalyticsPage,
            };

            const CurrentPage = pageMap[currentHash] || Dashboard;

            return (
                <div className="flex h-screen bg-gray-50">
                    <Sidebar isOpen={sidebarOpen} toggleSidebar={() => setSidebarOpen(!sidebarOpen)} userEmail={userEmail} userRole={userRole} onLogout={handleLogout} />
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <TopBar toggleSidebar={() => setSidebarOpen(!sidebarOpen)} userName={userName} userRole={userRole} />
                        <main className="flex-1 overflow-y-auto p-6">
                            <CurrentPage />
                        </main>
                    </div>
                </div>
            );
        };

        // ==================== Render App ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ToastProvider>
                <App />
            </ToastProvider>
        );
    </script>
</body>
</html>
