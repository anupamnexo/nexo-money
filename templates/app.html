<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo.money - Fintech Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        :root {
            --navy: #0F1B2D;
            --teal: #00D09C;
            --light-gray: #F7F9FC;
            --muted: #7A8BA3;
            --coral: #FF6B6B;
            --gold: #FFC107;
        }
        .sidebar {
            transition: transform 0.3s ease;
        }
        .sidebar.closed {
            transform: translateX(-100%);
        }
        .card-gradient {
            background: linear-gradient(135deg, #1a2f4f 0%, #0F1B2D 100%);
        }
        .toast {
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .modal-overlay {
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .trend-up { color: #00D09C; }
        .trend-down { color: #FF6B6B; }
    </style>
</head>
<body style="background-color: var(--light-gray);">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;
        const { AreaChart, Area, BarChart, Bar, PieChart, Pie, LineChart, Line, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

        // ==================== Utility Functions ====================
        const API_BASE = '/api';

        const apiCall = async (endpoint, options = {}) => {
            const token = localStorage.getItem('token');
            const headers = {
                'Content-Type': 'application/json',
                ...(token && { 'Authorization': `Bearer ${token}` }),
                ...options.headers
            };

            const response = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers
            });

            if (!response.ok) {
                if (response.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.hash = '#/login';
                }
                throw new Error(`API Error: ${response.status}`);
            }

            return response.json();
        };

        const formatCurrency = (amount) => {
            return '₹' + amount.toLocaleString('en-IN', { maximumFractionDigits: 0 });
        };

        const formatDate = (dateString) => {
            return new Date(dateString).toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });
        };

        const getStatusColor = (status) => {
            const colors = {
                'pending': { bg: 'bg-yellow-100', text: 'text-yellow-800' },
                'approved': { bg: 'bg-green-100', text: 'text-green-800' },
                'rejected': { bg: 'bg-red-100', text: 'text-red-800' },
                'auto_approved': { bg: 'bg-blue-100', text: 'text-blue-800' },
                'active': { bg: 'bg-green-100', text: 'text-green-800' },
                'frozen': { bg: 'bg-red-100', text: 'text-red-800' }
            };
            return colors[status] || colors['pending'];
        };

        // ==================== Toast Context ====================
        const ToastContext = createContext();

        const useToast = () => {
            const context = useContext(ToastContext);
            if (!context) throw new Error('useToast must be used within ToastProvider');
            return context;
        };

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);

            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 3000);
            };

            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <div className="fixed bottom-6 right-6 space-y-2 z-50">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`toast p-4 rounded-lg text-white ${toast.type === 'success' ? 'bg-green-500' : 'bg-red-500'}`}>
                                {toast.message}
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        // ==================== Shared Components ====================
        const Sidebar = ({ isOpen, toggleSidebar, userEmail, onLogout }) => {
            const currentHash = window.location.hash || '#/dashboard';

            const isActive = (hash) => currentHash === hash;

            const navItems = [
                { label: 'Dashboard', hash: '#/dashboard', icon: '📊' },
                { label: 'Cards', hash: '#/cards', icon: '💳' },
                { label: 'Expenses', hash: '#/expenses', icon: '📋' },
                { label: 'Approvals', hash: '#/approvals', icon: '✓' },
                { label: 'GST Tracker', hash: '#/gst', icon: '📈' },
                { label: 'Team', hash: '#/team', icon: '👥' },
                { label: 'Analytics', hash: '#/analytics', icon: '📉' }
            ];

            return (
                <>
                    {isOpen && <div className="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden" onClick={toggleSidebar}></div>}
                    <div className={`sidebar fixed lg:static left-0 top-0 h-screen w-64 flex flex-col z-50 transition-transform ${!isOpen && 'closed'} lg:translate-x-0 bg-blue-900 text-white`} style={{ backgroundColor: 'var(--navy)' }}>
                        <div className="p-6 border-b border-blue-800">
                            <div className="flex items-center justify-between">
                                <div>
                                    <h1 className="text-xl font-bold">Nexo</h1>
                                    <p className="text-xs text-blue-300">Money Dashboard</p>
                                </div>
                                <button onClick={toggleSidebar} className="lg:hidden text-white">✕</button>
                            </div>
                        </div>

                        <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                            {navItems.map(item => (
                                <a key={item.hash} href={item.hash} className={`block px-4 py-3 rounded-lg transition-colors ${isActive(item.hash) ? 'bg-teal-500 text-navy' : 'hover:bg-blue-800'}`} style={isActive(item.hash) ? { backgroundColor: 'var(--teal)', color: 'var(--navy)' } : {}}>
                                    <span className="mr-2">{item.icon}</span>{item.label}
                                </a>
                            ))}
                        </nav>

                        <div className="p-4 border-t border-blue-800 space-y-3">
                            <div className="text-xs text-blue-300">
                                <p className="truncate">{userEmail}</p>
                            </div>
                            <button onClick={onLogout} className="w-full bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded-lg text-sm font-medium">
                                Logout
                            </button>
                        </div>
                    </div>
                </>
            );
        };

        const TopBar = ({ toggleSidebar, userName }) => {
            return (
                <div className="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
                    <button onClick={toggleSidebar} className="lg:hidden text-navy text-xl">☰</button>
                    <div className="flex-1 flex items-center gap-2 lg:hidden">
                        <span className="text-sm font-semibold text-navy">Nexo</span>
                    </div>
                    <div className="flex items-center gap-4">
                        <span className="text-sm text-muted">{userName}</span>
                    </div>
                </div>
            );
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;

            return (
                <div className="modal-overlay fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40">
                    <div className="bg-white rounded-lg shadow-lg max-w-md w-full mx-4 max-h-96 overflow-y-auto">
                        <div className="flex justify-between items-center p-6 border-b border-gray-200">
                            <h2 className="text-lg font-bold text-navy">{title}</h2>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-700">✕</button>
                        </div>
                        <div className="p-6">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const StatCard = ({ label, value, trend, trendValue, icon }) => {
            return (
                <div className="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
                    <div className="flex items-start justify-between">
                        <div>
                            <p className="text-sm text-muted font-medium">{label}</p>
                            <p className="text-2xl font-bold text-navy mt-2">{value}</p>
                            {trendValue && (
                                <p className={`text-xs mt-2 ${trend === 'up' ? 'trend-up' : 'trend-down'}`}>
                                    {trend === 'up' ? '↑' : '↓'} {trendValue} from last month
                                </p>
                            )}
                        </div>
                        <div className="text-3xl">{icon}</div>
                    </div>
                </div>
            );
        };

        const Badge = ({ status }) => {
            const colors = getStatusColor(status);
            return (
                <span className={`badge ${colors.bg} ${colors.text}`}>
                    {status.replace('_', ' ').toUpperCase()}
                </span>
            );
        };

        const LoadingSpinner = () => (
            <div className="flex justify-center items-center p-12">
                <div className="text-center">
                    <div className="inline-block animate-spin text-4xl mb-4">⏳</div>
                    <p className="text-muted">Loading...</p>
                </div>
            </div>
        );

        // ==================== Auth Page ====================
        const LoginPage = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isLogin, setIsLogin] = useState(true);
            const [loading, setLoading] = useState(false);
            const { addToast } = useToast();

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const endpoint = isLogin ? '/auth/login' : '/auth/register';
                    const data = await apiCall(endpoint, {
                        method: 'POST',
                        body: JSON.stringify({ email, password })
                    });

                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    addToast(isLogin ? 'Login successful!' : 'Registration successful!', 'success');
                    window.location.hash = '#/dashboard';
                } catch (err) {
                    addToast(err.message, 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleDemoLogin = async () => {
                setEmail('priya.shah@technova.com');
                setPassword('demo123');
            };

            return (
                <div className="min-h-screen flex items-center justify-center" style={{ backgroundColor: 'var(--light-gray)' }}>
                    <div className="w-full max-w-md">
                        <div className="bg-white rounded-lg shadow-lg p-8">
                            <div className="text-center mb-8">
                                <h1 className="text-3xl font-bold text-navy">Nexo</h1>
                                <p className="text-muted text-sm mt-1">Smart Expense Management</p>
                            </div>

                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-navy mb-2">Email</label>
                                    <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" placeholder="you@example.com" />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-navy mb-2">Password</label>
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" placeholder="••••••••" />
                                </div>

                                <button type="submit" disabled={loading} className="w-full py-2 px-4 rounded-lg font-semibold text-white transition-colors" style={{ backgroundColor: 'var(--teal)', color: 'var(--navy)' }} disabled={loading}>
                                    {loading ? 'Loading...' : isLogin ? 'Login' : 'Register'}
                                </button>
                            </form>

                            <div className="mt-6">
                                <button onClick={handleDemoLogin} className="w-full py-2 px-4 border-2 border-teal-400 rounded-lg font-semibold text-teal-600 hover:bg-teal-50">
                                    Demo Login
                                </button>
                            </div>

                            <div className="mt-4 text-center">
                                <button onClick={() => setIsLogin(!isLogin)} className="text-sm text-muted hover:text-navy">
                                    {isLogin ? "Don't have an account? Register" : "Already have an account? Login"}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== Dashboard Page ====================
        const Dashboard = () => {
            const [dashboard, setDashboard] = useState(null);
            const [gstData, setGstData] = useState(null);
            const [spendData, setSpendData] = useState([]);
            const [categoryData, setCategoryData] = useState([]);
            const [teamData, setTeamData] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [budgets, setBudgets] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const [dashboardRes, gstRes] = await Promise.all([
                            apiCall('/dashboard'),
                            apiCall('/gst')
                        ]);

                        const dashData = dashboardRes.dashboard;
                        setDashboard(dashData);
                        setGstData(gstRes.gst);

                        // Transform spend_by_category object to array for PieChart
                        const categoryArray = Object.entries(dashData.spend_by_category || {}).map(([name, value]) => ({
                            name,
                            value
                        }));
                        setCategoryData(categoryArray);

                        // Transform spend_by_team object to array for BarChart
                        const teamArray = Object.entries(dashData.spend_by_team || {}).map(([name, value]) => ({
                            name,
                            value
                        }));
                        setTeamData(teamArray);

                        // Transform gst_by_month for spend trend (using as proxy)
                        const spendArray = Object.entries(dashData.spend_by_category || {}).map(([month, amount]) => ({
                            month,
                            amount
                        }));
                        setSpendData(spendArray);

                        setTransactions(dashData.recent_transactions || []);

                        // Transform budget_utilization to proper format
                        const budgetArray = (dashData.budget_utilization || []).map(b => ({
                            ...b,
                            category: b.category || `${b.team} - ${b.category}`,
                            spent: b.spent_this_month,
                            limit: b.monthly_limit
                        }));
                        setBudgets(budgetArray);
                    } catch (err) {
                        console.error('Error fetching dashboard data:', err);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            if (loading) return <LoadingSpinner />;

            const COLORS = ['#00D09C', '#0F1B2D', '#7A8BA3', '#FF6B6B'];

            return (
                <div className="space-y-6">
                    {/* Top Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard label="Total Spend (Month)" value={formatCurrency(dashboard?.total_spend_month || 0)} icon="💰" />
                        <StatCard label="Active Cards" value={dashboard?.active_cards || 0} icon="💳" />
                        <StatCard label="Pending Approvals" value={dashboard?.pending_approvals || 0} icon="⏳" />
                        <StatCard label="GST ITC Claimable" value={formatCurrency(gstData?.claimable_itc || 0)} icon="📈" />
                    </div>

                    {/* Charts Row */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Spend Trend */}
                        <div className="bg-white rounded-lg p-6 shadow-sm">
                            <h3 className="text-lg font-bold text-navy mb-4">Spend Trend (6 Months)</h3>
                            <ResponsiveContainer width="100%" height={300}>
                                <AreaChart data={spendData}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                    <XAxis dataKey="month" stroke="var(--muted)" />
                                    <YAxis stroke="var(--muted)" />
                                    <Tooltip contentStyle={{ backgroundColor: '#fff', border: '1px solid #e5e7eb', borderRadius: '8px' }} />
                                    <Area type="monotone" dataKey="amount" stroke="var(--teal)" fill="var(--teal)" fillOpacity={0.1} />
                                </AreaChart>
                            </ResponsiveContainer>
                        </div>

                        {/* Category Breakdown */}
                        <div className="bg-white rounded-lg p-6 shadow-sm">
                            <h3 className="text-lg font-bold text-navy mb-4">Spend by Category</h3>
                            <ResponsiveContainer width="100%" height={300}>
                                <PieChart>
                                    <Pie data={categoryData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={80} label>
                                        {categoryData.map((entry, index) => (
                                            <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                        ))}
                                    </Pie>
                                    <Tooltip />
                                </PieChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    {/* Budgets */}
                    <div className="bg-white rounded-lg p-6 shadow-sm">
                        <h3 className="text-lg font-bold text-navy mb-4">Budget Utilization</h3>
                        <div className="space-y-4">
                            {budgets.map((budget, idx) => (
                                <div key={idx}>
                                    <div className="flex justify-between mb-2">
                                        <span className="text-sm font-medium text-navy">{budget.category}</span>
                                        <span className="text-sm text-muted">{formatCurrency(budget.spent)} / {formatCurrency(budget.limit)}</span>
                                    </div>
                                    <div className="w-full bg-gray-200 rounded-full h-2">
                                        <div className="bg-teal-500 h-2 rounded-full transition-all" style={{ width: `${(budget.spent / budget.limit) * 100}%`, backgroundColor: 'var(--teal)' }}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Recent Transactions */}
                    <div className="bg-white rounded-lg p-6 shadow-sm">
                        <h3 className="text-lg font-bold text-navy mb-4">Recent Transactions</h3>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="border-b border-gray-200">
                                        <th className="text-left py-3 text-muted font-medium">Merchant</th>
                                        <th className="text-left py-3 text-muted font-medium">Category</th>
                                        <th className="text-right py-3 text-muted font-medium">Amount</th>
                                        <th className="text-left py-3 text-muted font-medium">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {transactions.map((txn, idx) => (
                                        <tr key={idx} className="border-b border-gray-100 hover:bg-gray-50">
                                            <td className="py-3 text-navy font-medium">{txn.merchant}</td>
                                            <td className="py-3 text-muted">{txn.category}</td>
                                            <td className="py-3 text-right text-navy font-semibold">{formatCurrency(txn.amount)}</td>
                                            <td className="py-3"><Badge status={txn.status} /></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== Cards Page ====================
        const CardsPage = () => {
            const [cards, setCards] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [newCard, setNewCard] = useState({ user_id: '', card_type: 'virtual', daily_limit: 10000, monthly_limit: 100000 });
            const { addToast } = useToast();

            useEffect(() => {
                const fetchCards = async () => {
                    try {
                        const data = await apiCall('/cards');
                        setCards(data.cards || []);
                    } catch (err) {
                        addToast('Error loading cards', 'error');
                    } finally {
                        setLoading(false);
                    }
                };
                fetchCards();
            }, []);

            const handleToggleFreeze = async (cardId, currentStatus) => {
                try {
                    const newStatus = currentStatus === 'frozen' ? 'active' : 'frozen';
                    await apiCall(`/cards/${cardId}`, {
                        method: 'PUT',
                        body: JSON.stringify({ status: newStatus })
                    });
                    setCards(cards.map(c => c.id === cardId ? { ...c, status: newStatus } : c));
                    addToast(currentStatus === 'frozen' ? 'Card unfrozen' : 'Card frozen', 'success');
                } catch (err) {
                    addToast('Error updating card', 'error');
                }
            };

            const handleIssueCard = async () => {
                if (!newCard.user_id) {
                    addToast('Please select a team member', 'error');
                    return;
                }
                try {
                    await apiCall('/cards', {
                        method: 'POST',
                        body: JSON.stringify(newCard)
                    });
                    addToast('Card issued successfully!', 'success');
                    setShowModal(false);
                    setNewCard({ user_id: '', card_type: 'virtual', daily_limit: 10000, monthly_limit: 100000 });
                    // Refresh cards
                    const data = await apiCall('/cards');
                    setCards(data.cards || []);
                } catch (err) {
                    addToast('Error issuing card', 'error');
                }
            };

            if (loading) return <LoadingSpinner />;

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h1 className="text-2xl font-bold text-navy">Cards Management</h1>
                        <button onClick={() => setShowModal(true)} className="px-6 py-2 rounded-lg font-semibold text-white transition-colors" style={{ backgroundColor: 'var(--teal)', color: 'var(--navy)' }}>
                            + Issue New Card
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {cards.map((card) => (
                            <div key={card.id} className="card-gradient rounded-lg p-6 text-white shadow-lg" style={{ background: 'linear-gradient(135deg, #1a2f4f 0%, #0F1B2D 100%)' }}>
                                <div className="flex justify-between items-start mb-8">
                                    <div>
                                        <p className="text-xs text-gray-300 mb-1">Card Number</p>
                                        <p className="text-lg font-mono">****{card.card_number?.slice(-4)}</p>
                                    </div>
                                    <div className="text-2xl">💳</div>
                                </div>

                                <div className="mb-6">
                                    <p className="text-xs text-gray-300 mb-1">Card Type</p>
                                    <p className="font-semibold">{card.card_type?.toUpperCase()}</p>
                                </div>

                                <div className="grid grid-cols-2 gap-4 mb-6 pb-6 border-t border-gray-400">
                                    <div className="pt-4">
                                        <p className="text-xs text-gray-300">Daily Limit</p>
                                        <p className="font-semibold">{formatCurrency(card.daily_limit)}</p>
                                        <p className="text-xs text-gray-300 mt-1">Spent: {formatCurrency(card.spent_today || 0)}</p>
                                    </div>
                                    <div className="pt-4">
                                        <p className="text-xs text-gray-300">Monthly Limit</p>
                                        <p className="font-semibold">{formatCurrency(card.monthly_limit)}</p>
                                        <p className="text-xs text-gray-300 mt-1">Spent: {formatCurrency(card.spent_month || 0)}</p>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <Badge status={card.status} />

                    setApprovals(approvals.filter(a => a.id !== expenseId));

                    setApproved(updated.expenses || []);

                                </div>

                                <div className="mb-4 pb-4 border-b border-gray-200">
                                    <span className={`badge ${getRoleColor(member.role)}`}>
                                        {member.role.toUpperCase()}
                                    </span>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <p className="text-xs text-muted">Cards Issued</p>
                                        <p className="text-2xl font-bold text-navy">{member.cards_issued || 0}</p>
                                    </div>
                                    <div>
                                        <p className="text-xs text-muted">Total Spend</p>
                                        <p className="text-lg font-bold text-navy">{formatCurrency(member.total_spend || 0)}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <Modal isOpen={showModal} onClose={() => setShowModal(false)} title="Add Team Member">
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-navy mb-2">Name</label>
                                <input type="text" value={newMember.name} onChange={(e) => setNewMember({ ...newMember, name: e.target.value })} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-navy mb-2">Email</label>
                                <input type="email" value={newMember.email} onChange={(e) => setNewMember({ ...newMember, email: e.target.value })} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-navy mb-2">Role</label>
                                <select value={newMember.role} onChange={(e) => setNewMember({ ...newMember, role: e.target.value })} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
                                    <option value="employee">Employee</option>
                                    <option value="approver">Approver</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>

                            <label className="flex items-center gap-2">
                                <input type="checkbox" checked={newMember.issue_card} onChange={(e) => setNewMember({ ...newMember, issue_card: e.target.checked })} />
                                <span className="text-sm text-navy">Issue card immediately</span>
                            </label>

                            <button onClick={handleAddMember} className="w-full mt-4 py-2 px-4 rounded-lg font-semibold text-white transition-colors" style={{ backgroundColor: 'var(--teal)', color: 'var(--navy)' }}>
                                Add Member
                            </button>
                        </div>
                    </Modal>
                </div>
            );
        };

        // ==================== Analytics Page ====================
        const AnalyticsPage = () => {
            const [trendData, setTrendData] = useState([]);
            const [categoryData, setCategoryData] = useState([]);
            const [merchantData, setMerchantData] = useState([]);
            const [metrics, setMetrics] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchAnalytics = async () => {
                    try {
                        const analyticsRes = await apiCall('/analytics');
                        const analyticsData = analyticsRes.analytics;

                        // Transform spend_trend object to array for LineChart
                        const trendArray = Object.entries(analyticsData.spend_trend || {}).map(([month, amount]) => ({
                            month,
                            amount
                        }));
                        setTrendData(trendArray);

                        // Transform category_breakdown object to array for PieChart
                        const categoryArray = Object.entries(analyticsData.category_breakdown || {}).map(([name, value]) => ({
                            name,
                            value
                        }));
                        setCategoryData(categoryArray);

                        // Transform top_merchants array - map to chart format
                        const merchantArray = (analyticsData.top_merchants || []).map(m => ({
                            name: m.name,
                            amount: m.total
                        }));
                        setMerchantData(merchantArray);

                        setMetrics(analyticsData);
                    } catch (err) {
                        console.error('Error loading analytics:', err);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchAnalytics();
            }, []);

            if (loading) return <LoadingSpinner />;

            const COLORS = ['#00D09C', '#0F1B2D', '#7A8BA3', '#FF6B6B'];

            return (
                <div className="space-y-6">
                    <h1 className="text-2xl font-bold text-navy">Analytics & Insights</h1>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard label="Avg Transaction" value={formatCurrency(metrics?.avg_transaction_size || 0)} icon="💵" />
                        <StatCard label="Total Transactions" value={metrics?.total_transactions || 0} icon="🔢" />
                        <StatCard label="Card Utilization" value={`${metrics?.cards_utilization || 0}%`} icon="📊" />
                        <StatCard label="Total Spend" value={formatCurrency(Object.values(metrics?.spend_trend || {}).reduce((a, b) => a + b, 0))} icon="💰" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-lg p-6 shadow-sm">
                            <h3 className="text-lg font-bold text-navy mb-4">12-Month Spend Trend</h3>
                            <ResponsiveContainer width="100%" height={300}>
                                <LineChart data={trendData}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                    <XAxis dataKey="month" stroke="var(--muted)" />
                                    <YAxis stroke="var(--muted)" />
                                    <Tooltip contentStyle={{ backgroundColor: '#fff', border: '1px solid #e5e7eb', borderRadius: '8px' }} />
                                    <Line type="monotone" dataKey="amount" stroke="var(--teal)" strokeWidth={2} dot={{ fill: 'var(--teal)', r: 4 }} />
                                </LineChart>
                            </ResponsiveContainer>
                        </div>

                        <div className="bg-white rounded-lg p-6 shadow-sm">
                            <h3 className="text-lg font-bold text-navy mb-4">Category Breakdown</h3>
                            <ResponsiveContainer width="100%" height={300}>
                                <PieChart>
                                    <Pie data={categoryData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={80} label>
                                        {categoryData.map((entry, index) => (
                                            <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                        ))}
                                    </Pie>
                                    <Tooltip />
                                </PieChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    <div className="bg-white rounded-lg p-6 shadow-sm">
                        <h3 className="text-lg font-bold text-navy mb-4">Top Merchants</h3>
                        <ResponsiveContainer width="100%" height={300}>
                            <BarChart data={merchantData} layout="vertical">
                                <CartesianGrid strokeDasharray="3 3" stroke="#e5e7eb" />
                                <XAxis type="number" stroke="var(--muted)" />
                                <YAxis dataKey="name" type="category" stroke="var(--muted)" width={120} />
                                <Tooltip contentStyle={{ backgroundColor: '#fff', border: '1px solid #e5e7eb', borderRadius: '8px' }} />
                                <Bar dataKey="amount" fill="var(--teal)" />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        };

        // ==================== Main App Component ====================
        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(!!localStorage.getItem('token'));
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [userEmail, setUserEmail] = useState('');
            const [userName, setUserName] = useState('');
            const { addToast } = useToast();

            useEffect(() => {
                const token = localStorage.getItem('token');
                const user = localStorage.getItem('user');
                if (token && user) {
                    setIsAuthenticated(true);
                    const userData = JSON.parse(user);
                    setUserEmail(userData.email || '');
                    setUserName(userData.name || userData.email || '');
                } else {
                    setIsAuthenticated(false);
                }
            }, []);

            const handleLogout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                setIsAuthenticated(false);
                window.location.hash = '#/login';
                addToast('Logged out successfully', 'success');
            };

            const toggleSidebar = () => {
                setSidebarOpen(!sidebarOpen);
            };

            const closeSidebarOnNav = () => {
                setSidebarOpen(false);
            };

            if (!isAuthenticated) {
                return <LoginPage />;
            }

            const currentHash = window.location.hash || '#/dashboard';
            let CurrentPage = Dashboard;

            switch (currentHash) {
                case '#/cards':
                    CurrentPage = CardsPage;
                    break;
                case '#/expenses':
                    CurrentPage = ExpensesPage;
                    break;
                case '#/approvals':
                    CurrentPage = ApprovalsPage;
                    break;
                case '#/gst':
                    CurrentPage = GSTPage;
                    break;
                case '#/team':
                    CurrentPage = TeamPage;
                    break;
                case '#/analytics':
                    CurrentPage = AnalyticsPage;
                    break;
                default:
                    CurrentPage = Dashboard;
            }

            window.addEventListener('hashchange', closeSidebarOnNav);

            return (
                <div className="flex h-screen bg-gray-50">
                    <Sidebar isOpen={sidebarOpen} toggleSidebar={toggleSidebar} userEmail={userEmail} onLogout={handleLogout} />

                    <div className="flex-1 flex flex-col overflow-hidden">
                        <TopBar toggleSidebar={toggleSidebar} userName={userName} />

                        <main className="flex-1 overflow-y-auto p-6">
                            <CurrentPage />
                        </main>
                    </div>
                </div>
            );
        };

        // ==================== Render App ====================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ToastProvider>
                <App />
            </ToastProvider>
        );
    </script>
</body>
</html>
